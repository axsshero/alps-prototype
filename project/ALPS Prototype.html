<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALPS — Project Visibility Tool</title>
  <style>
    :root {
      --alps-primary: #2563eb;
      --alps-accent: #0891b2;
      --alps-success: #10b981;
      --alps-warning: #f59e0b;
      --alps-danger: #ef4444;
      --alps-info: #06b6d4;
      --alps-bg: #1a1a1a;
      --alps-bg-alt: #262626;
      --alps-bg-hover: #2e2e2e;
      --alps-text: #f0f0f0;
      --alps-text-muted: #a0a0a0;
      --alps-border: #3f3f3f;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --alps-cleared: #10b981;
      --alps-active: #0891b2;
      --alps-locked-stroke: #4b5563;
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: var(--font-sans); }

    .alps-app {
      background: var(--alps-bg);
      color: var(--alps-text);
      min-height: 100vh;
      display: flex;
      flex-direction: row;
    }

    .alps-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--alps-bg-alt);
      border-right: 1px solid var(--alps-border);
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .alps-main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      min-height: 100vh;
    }

    /* Gate cards */
    .gate-card {
      background: var(--alps-bg-alt);
      border: 1px solid var(--alps-border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .gate-card:hover { border-color: var(--alps-accent); }
    .gate-card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .gate-card-header:hover, .gate-card-header.expanded { background: var(--alps-bg-hover); }
    .gate-card-body {
      padding: 16px;
      display: grid;
      gap: 12px;
      border-top: 1px solid var(--alps-border);
    }

    /* Primitives CSS */
    .alps-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .alps-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .alps-pill--neutral  { background: rgba(156,163,175,0.15); color: var(--alps-text-muted); }
    .alps-pill--info     { background: rgba(6,182,212,0.15);   color: var(--alps-info); }
    .alps-pill--success  { background: rgba(16,185,129,0.15);  color: var(--alps-success); }
    .alps-pill--danger   { background: rgba(239,68,68,0.15);   color: var(--alps-danger); }
    .alps-pill--muted    { background: rgba(156,163,175,0.1);  color: var(--alps-text-muted); }
    .alps-pill--warning  { background: rgba(245,158,11,0.15);  color: var(--alps-warning); }
    .alps-pill--mono     { font-family: var(--font-mono); font-size: 10px; }

    .alps-gates {
      display: inline-flex;
      align-items: center;
    }

    .alps-gaterow {
      display: flex;
      gap: 8px;
    }

    .alps-gate {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--alps-bg-alt);
      border: 1px solid var(--alps-border);
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      font-family: var(--font-sans);
    }
    .alps-gate:hover { border-color: var(--alps-accent); background: var(--alps-bg-hover); }
    .alps-gate--selected { border-color: var(--alps-accent); background: rgba(8,145,178,0.08); }
    .alps-gate__triangle { flex-shrink: 0; }
    .alps-gate__meta { display: grid; gap: 2px; }
    .alps-gate__index { font-size: 10px; color: var(--alps-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .alps-gate__label { font-size: 13px; font-weight: 600; color: var(--alps-text); }
    .alps-gate__purpose { font-size: 11px; color: var(--alps-text-muted); }
    .alps-gate__status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--alps-text-muted); margin-top: 2px; }
    .alps-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .alps-dot--cleared { background: var(--alps-success); }
    .alps-dot--active  { background: var(--alps-accent); }
    .alps-dot--locked  { background: var(--alps-text-muted); }
    .alps-mono { font-family: var(--font-mono); font-size: 10px; }

    .alps-section {
      background: var(--alps-bg-alt);
      border: 1px solid var(--alps-border);
      border-radius: 8px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .alps-section--dense { padding: 12px; gap: 10px; }
    .alps-section__head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .alps-kicker {
      font-size: 10px;
      font-weight: 700;
      color: var(--alps-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .alps-section__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--alps-text);
      margin: 0;
    }
    .alps-section__right { flex-shrink: 0; }
    .alps-section__body {}

    .alps-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }
    .alps-btn--default  { background: var(--alps-bg); color: var(--alps-text); border: 1px solid var(--alps-border) !important; }
    .alps-btn--default:hover { border-color: var(--alps-text-muted) !important; }
    .alps-btn--primary  { background: var(--alps-accent); color: white; }
    .alps-btn--primary:hover { background: #0a9fb5; }
    .alps-btn--danger   { background: transparent; color: var(--alps-danger); border: 1px solid var(--alps-danger) !important; }
    .alps-btn--danger:hover { background: rgba(239,68,68,0.1); }
    .alps-btn--success  { background: var(--alps-success); color: white; }
    .alps-btn--success:hover { background: #0ca678; }
    .alps-btn--sm { padding: 4px 8px; font-size: 11px; }
    .alps-btn--lg { padding: 10px 18px; font-size: 14px; }
    .alps-btn__icon { display: flex; align-items: center; }

    select {
      font-family: var(--font-sans);
    }
    select:focus { outline: none; border-color: var(--alps-accent) !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Load order: data → utils → primitives → attachments → screens → app shell -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="utils.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="attachments.jsx"></script>
  <script type="text/babel" src="screen-dashboard.jsx"></script>
  <script type="text/babel" src="screen-portfolio.jsx"></script>
  <script type="text/babel" src="screen-cycles.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
