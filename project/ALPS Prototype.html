<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALPS — Project Visibility Tool</title>
  <style>
    :root {
      --alps-primary: #2563eb;
      --alps-accent: #0891b2;
      --alps-success: #10b981;
      --alps-warning: #f59e0b;
      --alps-danger: #ef4444;
      --alps-info: #06b6d4;
      --alps-bg: #0f172a;
      --alps-bg-alt: #1a2847;
      --alps-bg-hover: #243658;
      --alps-text: #f0f0f0;
      --alps-text-muted: #9ca3af;
      --alps-border: #374151;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: var(--font-sans); }

    .alps-app {
      background: var(--alps-bg);
      color: var(--alps-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .alps-header {
      background: var(--alps-bg-alt);
      border-bottom: 1px solid var(--alps-border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .alps-main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .gate-card {
      background: var(--alps-bg-alt);
      border: 1px solid var(--alps-border);
      border-radius: 8px;
      padding: 0;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .gate-card:hover {
      border-color: var(--alps-accent);
    }

    .gate-card-header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--alps-border);
    }

    .gate-card-header:hover {
      background: var(--alps-bg-hover);
    }

    .gate-card-header.expanded {
      background: var(--alps-bg-hover);
    }

    .gate-card-body {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .checklist-item {
      padding: 12px;
      background: var(--alps-bg);
      border-radius: 6px;
      border-left: 3px solid var(--alps-border);
      display: grid;
      gap: 8px;
    }

    .checklist-item.complete {
      border-left-color: var(--alps-success);
      background: rgba(16, 185, 129, 0.05);
    }

    .checklist-item.warning {
      border-left-color: var(--alps-warning);
      background: rgba(245, 158, 11, 0.05);
    }

    .checklist-item.missing {
      border-left-color: var(--alps-border);
    }

    .checklist-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .checklist-item-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--alps-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .checklist-item-status {
      font-size: 11px;
      font-weight: 600;
      color: var(--alps-text-muted);
      padding: 2px 6px;
      background: var(--alps-bg-hover);
      border-radius: 3px;
    }

    .checklist-item.complete .checklist-item-status {
      color: var(--alps-success);
      background: rgba(16, 185, 129, 0.1);
    }

    .checklist-item.warning .checklist-item-status {
      color: var(--alps-warning);
      background: rgba(245, 158, 11, 0.1);
    }

    .checklist-item-content {
      font-size: 12px;
      color: var(--alps-text-muted);
      line-height: 1.5;
    }

    .checklist-item-content input,
    .checklist-item-content textarea {
      width: 100%;
      padding: 8px;
      background: var(--alps-bg-alt);
      border: 1px solid var(--alps-border);
      border-radius: 4px;
      color: var(--alps-text);
      font-size: 12px;
      font-family: var(--font-sans);
      margin-top: 4px;
    }

    .checklist-item-content textarea {
      resize: vertical;
      min-height: 60px;
    }

    .ai-suggestion {
      padding: 10px;
      background: rgba(245, 158, 11, 0.08);
      border-left: 3px solid var(--alps-warning);
      border-radius: 4px;
      display: grid;
      gap: 8px;
    }

    .ai-suggestion-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--alps-warning);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ai-suggestion-text {
      font-size: 11px;
      color: var(--alps-text);
      line-height: 1.4;
    }

    .ai-suggestion-actions {
      display: flex;
      gap: 6px;
    }

    .ai-suggestion-actions button {
      padding: 4px 8px;
      background: transparent;
      border: 1px solid var(--alps-warning);
      color: var(--alps-warning);
      border-radius: 3px;
      cursor: "pointer";
      font-size: 10px;
      font-weight: 600;
    }

    .ai-suggestion-actions button:hover {
      background: rgba(245, 158, 11, 0.1);
    }

    .gate-header-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .gate-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--alps-bg);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .gate-status-badge.complete {
      background: rgba(16, 185, 129, 0.1);
      color: var(--alps-success);
    }

    .gate-status-badge.in-progress {
      background: rgba(8, 145, 178, 0.1);
      color: var(--alps-accent);
    }

    .gate-status-badge.locked {
      background: rgba(107, 114, 128, 0.1);
      color: var(--alps-text-muted);
    }

    .completion-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .completion-bar {
      width: 80px;
      height: 6px;
      background: var(--alps-bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .completion-bar-fill {
      height: 100%;
      background: var(--alps-accent);
      transition: width 0.3s;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--alps-text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .button-primary {
      padding: 8px 12px;
      background: var(--alps-accent);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .button-primary:hover {
      background: #0a9fb5;
    }

    .button-secondary {
      padding: 8px 12px;
      background: transparent;
      color: var(--alps-text-muted);
      border: 1px solid var(--alps-border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .button-secondary:hover {
      color: var(--alps-text);
      border-color: var(--alps-text);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState } = React;

    // Mock data
    window.PROJECT = {
      id: "ALI-42",
      title: "Recurring Engine — Subscription Billing",
      summary: "Build subscription and billing management system with retry logic",
      pm: "rina",
      techLead: "mateo",
      cycles: [
        { id: 1, name: "Sprint 1: Foundation", startDate: "Apr 1", endDate: "Apr 14", tickets: 5 },
        { id: 2, name: "Sprint 2: Payment Logic", startDate: "Apr 15", endDate: "Apr 28", tickets: 8 },
        { id: 3, name: "Sprint 3: Retry & Dunning", startDate: "Apr 29", endDate: "May 12", tickets: 6 },
      ],
      gates: {
        business: {
          status: "cleared",
          completion: 100,
          checklist: [
            { id: "b1", label: "Business Case", content: "Clear ROI: $2M annual revenue, 15% margin", status: "complete", aiSuggestion: null },
            { id: "b2", label: "Success Metrics", content: "Payment success rate > 99.5%, reduce churn by 20%", status: "complete", aiSuggestion: null },
            { id: "b3", label: "Stakeholders", content: "CFO, VP Product, Head of Growth", status: "complete", aiSuggestion: null },
            { id: "b4", label: "GTM / Rollout Plan", content: "", status: "warning", aiSuggestion: "Suggest phased rollout: Beta (10% users) → Stage (50%) → GA (100%)" }
          ],
          owner: "rina",
          dueDate: "Apr 10"
        },
        product: {
          status: "in_progress",
          completion: 70,
          checklist: [
            { id: "p1", label: "User Flow", content: "Customer initiates payment → Retry logic → Success/failure notification", status: "complete", aiSuggestion: null },
            { id: "p2", label: "Feature Breakdown", content: "Payment retry (exp backoff), dunning emails, dashboard", status: "complete", aiSuggestion: null },
            { id: "p3", label: "Acceptance Criteria", content: "", status: "warning", aiSuggestion: "Add: Handle mid-dunning upgrades, SLA for retry timing" },
            { id: "p4", label: "Edge Cases", content: "Customer cancels mid-process, timezone handling", status: "missing", aiSuggestion: null }
          ],
          owner: "maya",
          dueDate: "Apr 25"
        },
        tech: {
          status: "locked",
          completion: 20,
          checklist: [
            { id: "t1", label: "Technical Approach", content: "", status: "missing", aiSuggestion: "Consider: Queue-based retry (SQS), idempotent API design" },
            { id: "t2", label: "Dependencies", content: "Payment gateway API, Email service, Database migrations", status: "warning", aiSuggestion: null },
            { id: "t3", label: "Constraints", content: "", status: "missing", aiSuggestion: "Define: Max retry count, timeout windows, cost limits" },
            { id: "t4", label: "Timeline Impact", content: "", status: "missing", aiSuggestion: null }
          ],
          owner: "mateo",
          dueDate: "May 5"
        }
      }
    };

    window.PEOPLE = {
      you: { fullName: "You", initials: "JD", id: "you" },
      rina: { fullName: "Rina Patel", initials: "RP", id: "rina" },
      maya: { fullName: "Maya Chen", initials: "MC", id: "maya" },
      mateo: { fullName: "Mateo Rodriguez", initials: "MR", id: "mateo" },
    };

    window.LINEAR_TICKETS = {
      "LIN-204": { id: "LIN-204", title: "Payment retry logic with exponential backoff", status: "in_progress", cycle: 2, assignee: "mateo", description: "Implement exponential backoff for failed payment retries with circuit breaker pattern.", gitlab: "MR !128", priority: "high" },
      "LIN-205": { id: "LIN-205", title: "Dunning email sequence", status: "in_progress", cycle: 3, assignee: "maya", description: "Build automated email sequence for overdue subscriptions with proper cancellation handling.", gitlab: "MR !132", priority: "medium" },
      "LIN-206": { id: "LIN-206", title: "Billing dashboard UI", status: "in_progress", cycle: 2, assignee: "rina", description: "Customer-facing billing dashboard with invoice history.", gitlab: "MR !135", priority: "medium" },
      "LIN-207": { id: "LIN-207", title: "Email notifications for failed payments", status: "done", cycle: 1, assignee: "mateo", description: "Trigger email notifications on payment failure events.", gitlab: "MR !115 (merged)", priority: "high" },
    };

    window.SUGGESTIONS = {
      "sug-1": {
        id: "sug-1",
        ticketId: "LIN-204",
        type: "scope_update",
        suggestion: "Add circuit breaker pattern to prevent cascading failures during payment retries",
        rationale: "Reduces system load and improves resilience",
        status: "pending_approval",
      },
    };

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const initialScreen = urlParams.get("view") === "progress" ? "progress" : "dashboard";
      const [role, setRole] = useState("pm");
      const [screen, setScreen] = useState(initialScreen);
      const [suggestions, setSuggestions] = useState(window.SUGGESTIONS || {});
      const [expandedGate, setExpandedGate] = useState("business");
      const [gateEdits, setGateEdits] = useState({});
      const [selectedTicket, setSelectedTicket] = useState(null);
      const [filterCycle, setFilterCycle] = useState("all");
      const [filterStatus, setFilterStatus] = useState("all");
      const [filterPriority, setFilterPriority] = useState("all");
      const [filterAssignee, setFilterAssignee] = useState("all");

      const project = window.PROJECT;
      const pendingSuggestions = Object.values(suggestions).filter((s) => s.status === "pending_approval");
      const approvedSuggestions = Object.values(suggestions).filter((s) => s.status === "approved");

      const handleSuggestionApprove = (sugId, editedContent) => {
        const updated = { ...suggestions };
        Object.keys(updated).forEach((key) => {
          if (updated[key].id === sugId) {
            updated[key].status = "approved";
            if (editedContent) {
              updated[key].suggestion = editedContent;
            }
          }
        });
        setSuggestions(updated);
      };

      const handleSuggestionReject = (sugId, rejectionReason) => {
        const updated = { ...suggestions };
        Object.keys(updated).forEach((key) => {
          if (updated[key].id === sugId) {
            updated[key].status = "rejected";
            updated[key].rejectionReason = rejectionReason;
          }
        });
        setSuggestions(updated);
      };

      const updateGateItem = (gateId, itemId, newContent) => {
        const gate = project.gates[gateId];
        const item = gate.checklist.find((i) => i.id === itemId);
        if (item) {
          item.content = newContent;
          if (newContent.trim()) {
            item.status = "complete";
          }
        }
      };

      const acceptAISuggestion = (gateId, itemId, suggestion) => {
        const gate = project.gates[gateId];
        const item = gate.checklist.find((i) => i.id === itemId);
        if (item) {
          item.content = suggestion;
          item.status = "complete";
          item.aiSuggestion = null;
        }
      };

      const getGateStatusDisplay = (status) => {
        if (status === "cleared") return { label: "✓ Cleared", className: "complete" };
        if (status === "in_progress") return { label: "→ In Progress", className: "in-progress" };
        return { label: "○ Locked", className: "locked" };
      };

      const getItemStatusIcon = (status) => {
        if (status === "complete") return "✅";
        if (status === "warning") return "⚠️";
        return "⬜";
      };

      return (
        <div className="alps-app">
          <header className="alps-header">
            <div style={{ display: "flex", alignItems: "center", gap: "24px", flex: 1 }}>
              <div style={{ fontSize: "18px", fontWeight: "700" }}>ALPS</div>
              <nav style={{ display: "flex", gap: "2px" }}>
                {[
                  { id: "dashboard", label: "Dashboard" },
                  { id: "portfolio", label: "Portfolio" },
                ].map((item) => (
                  <button
                    key={item.id}
                    onClick={() => setScreen(item.id)}
                    style={{
                      padding: "8px 12px",
                      background: screen === item.id ? "var(--alps-accent)" : "transparent",
                      color: screen === item.id ? "white" : "var(--alps-text-muted)",
                      border: "none",
                      borderRadius: "4px",
                      cursor: "pointer",
                      fontSize: "12px",
                      fontWeight: screen === item.id ? "600" : "400",
                    }}
                  >
                    {item.label}
                  </button>
                ))}
              </nav>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
              <select
                value={role}
                onChange={(e) => setRole(e.target.value)}
                style={{
                  padding: "6px 8px",
                  background: "var(--alps-bg)",
                  border: "1px solid var(--alps-border)",
                  borderRadius: "4px",
                  color: "var(--alps-text)",
                  fontSize: "12px",
                  fontWeight: "600",
                  cursor: "pointer",
                }}
              >
                <option value="pm">PM</option>
                <option value="developer">Developer</option>
                <option value="techLead">Tech Lead</option>
              </select>
            </div>
          </header>

          <main className="alps-main">
            {screen === "dashboard" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: "24px", alignItems: "start" }}>
                {/* LEFT COLUMN - Gates (Primary Focus) */}
                <div style={{ display: "grid", gap: "24px" }}>
                  {/* Project Header */}
                  <div style={{ padding: "16px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <h1 style={{ fontSize: "16px", fontWeight: "600", margin: "0 0 6px 0" }}>{project.title}</h1>
                      <div style={{ fontSize: "12px", color: "var(--alps-text-muted)" }}>{project.id} · {project.summary}</div>
                      <div style={{ display: "flex", gap: "24px", marginTop: "12px", fontSize: "11px" }}>
                        <div>
                          <div style={{ color: "var(--alps-text-muted)", marginBottom: "4px" }}>PM</div>
                          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                            <Avatar person={project.pm} size={18} />
                            {window.PEOPLE[project.pm]?.fullName}
                          </div>
                        </div>
                        <div>
                          <div style={{ color: "var(--alps-text-muted)", marginBottom: "4px" }}>Tech Lead</div>
                          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                            <Avatar person={project.techLead} size={18} />
                            {window.PEOPLE[project.techLead]?.fullName}
                          </div>
                        </div>
                      </div>
                    </div>
                    <button className="button-secondary">✎ Edit</button>
                  </div>

                  {/* Progress / Ticket Status */}
                  <div style={{ padding: "16px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", display: "grid", gap: "12px" }}>
                    <div>
                      <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", fontWeight: "600", textTransform: "uppercase", marginBottom: "4px" }}>Progress</div>
                      <div style={{ fontSize: "14px", fontWeight: "600", color: "var(--alps-text)" }}>Ticket Status</div>
                    </div>
                    <div style={{ fontSize: "13px", fontWeight: "600" }}>
                      {Object.values(window.LINEAR_TICKETS).filter(t => t.status === "done").length}/{Object.keys(window.LINEAR_TICKETS).length} tickets complete
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px" }}>
                      <div style={{ padding: "12px", background: "var(--alps-bg)", borderRadius: "4px", borderLeft: "3px solid var(--alps-success)" }}>
                        <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginBottom: "4px" }}>DONE</div>
                        <div style={{ fontSize: "20px", fontWeight: "600", color: "var(--alps-success)" }}>{Object.values(window.LINEAR_TICKETS).filter(t => t.status === "done").length}</div>
                      </div>
                      <div style={{ padding: "12px", background: "var(--alps-bg)", borderRadius: "4px", borderLeft: "3px solid var(--alps-accent)" }}>
                        <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginBottom: "4px" }}>IN PROG</div>
                        <div style={{ fontSize: "20px", fontWeight: "600", color: "var(--alps-accent)" }}>{Object.values(window.LINEAR_TICKETS).filter(t => t.status === "in_progress").length}</div>
                      </div>
                      <div style={{ padding: "12px", background: "var(--alps-bg)", borderRadius: "4px", borderLeft: "3px solid var(--alps-danger)" }}>
                        <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginBottom: "4px" }}>BLOCKED</div>
                        <div style={{ fontSize: "20px", fontWeight: "600", color: "var(--alps-danger)" }}>{Object.values(window.LINEAR_TICKETS).filter(t => t.status === "blocked").length}</div>
                      </div>
                      <div style={{ padding: "12px", background: "var(--alps-bg)", borderRadius: "4px", borderLeft: "3px solid var(--alps-text-muted)" }}>
                        <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginBottom: "4px" }}>TODO</div>
                        <div style={{ fontSize: "20px", fontWeight: "600", color: "var(--alps-text-muted)" }}>{Object.values(window.LINEAR_TICKETS).filter(t => !["done","in_progress","blocked"].includes(t.status)).length}</div>
                      </div>
                    </div>
                    <button
                      onClick={() => window.open(window.location.pathname + "?view=progress", "_blank")}
                      style={{
                        padding: "10px",
                        background: "var(--alps-accent)",
                        color: "white",
                        border: "none",
                        borderRadius: "4px",
                        cursor: "pointer",
                        fontSize: "12px",
                        fontWeight: "600",
                        width: "100%",
                      }}
                    >
                      View Progress & Cycles
                    </button>
                  </div>

                  {/* 3-Gate Validation Section */}
                  <div>
                    <div className="section-title">Validation Gates — Structured Requirements</div>
                    
                    {["business", "product", "tech"].map((gateId) => {
                      const gate = project.gates[gateId];
                      const isExpanded = expandedGate === gateId;
                      const statusDisplay = getGateStatusDisplay(gate.status);
                      const gateLabels = { business: "Business Gate", product: "Product Gate", tech: "Tech Gate" };

                      return (
                        <div key={gateId} className="gate-card">
                          <div
                            className={`gate-card-header ${isExpanded ? "expanded" : ""}`}
                            onClick={() => setExpandedGate(isExpanded ? null : gateId)}
                          >
                            <div className="gate-header-info">
                              <div style={{ flex: 1 }}>
                                <div style={{ fontSize: "13px", fontWeight: "600", color: "var(--alps-text)" }}>
                                  {gateLabels[gateId]}
                                </div>
                              </div>
                              <div className={`gate-status-badge ${statusDisplay.className}`}>
                                {statusDisplay.label}
                              </div>
                              <div className="completion-indicator">
                                <div className="completion-bar">
                                  <div
                                    className="completion-bar-fill"
                                    style={{ width: `${gate.completion}%` }}
                                  ></div>
                                </div>
                                <span>{gate.completion}%</span>
                              </div>
                            </div>

                                        <button onClick={() => {}}>Ignore</button>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* RIGHT COLUMN - Pending AI Suggestions */}
                <div style={{ position: "sticky", top: "80px", display: "grid", gap: "24px" }}>

                    <div style={{ background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", padding: "16px", display: "grid", gap: "12px" }}>
                      <div style={{ fontSize: "12px", fontWeight: "600", color: "var(--alps-text-muted)", textTransform: "uppercase" }}>
                        {pendingSuggestions.length}
                      </div>
                      <div style={{ fontSize: "14px", fontWeight: "600", color: "var(--alps-text)" }}>Pending AI Suggestions</div>
                      <div style={{ display: "grid", gap: "12px" }}>
                        {pendingSuggestions.map((sug) => {
                          const [editText, setEditText] = useState(sug.suggestion);
                          const [showRejectInput, setShowRejectInput] = useState(false);
                          const [rejectReason, setRejectReason] = useState("");

                          return (
                            <div key={sug.id} style={{ padding: "12px", background: "rgba(245, 158, 11, 0.1)", borderLeft: "3px solid var(--alps-warning)", borderRadius: "4px", display: "grid", gap: "8px" }}>
                              <div style={{ fontSize: "11px", fontWeight: "600", color: "var(--alps-warning)", textTransform: "uppercase" }}>
                                {sug.type === "scope_update" && "SCOPE UPDATE"}
                                {sug.type === "acceptance_criteria" && "ACCEPTANCE"}
                              </div>
                              <div style={{ fontSize: "12px", color: "var(--alps-text)", fontWeight: "500" }}>
                                {sug.ticketId}: {window.LINEAR_TICKETS[sug.ticketId]?.title}
                              </div>
                              <div style={{ fontSize: "11px", color: "var(--alps-text-muted)" }}>
                                {sug.rationale}
                              </div>
                              <textarea
                                value={editText}
                                onChange={(e) => setEditText(e.target.value)}
                                rows="3"
                                style={{
                                  width: "100%",
                                  padding: "8px",
                                  border: "1px solid var(--alps-border)",
                                  borderRadius: "3px",
                                  fontSize: "12px",
                                  background: "var(--alps-bg-alt)",
                                  color: "var(--alps-text)",
                                  fontFamily: "var(--font-sans)",
                                  marginTop: "4px",
                                }}
                              />
                              {showRejectInput && (
                                <textarea
                                  value={rejectReason}
                                  onChange={(e) => setRejectReason(e.target.value)}
                                  rows="2"
                                  placeholder="Feedback..."
                                  style={{
                                    width: "100%",
                                    padding: "8px",
                                    border: "1px solid var(--alps-border)",
                                    borderRadius: "3px",
                                    fontSize: "12px",
                                    background: "var(--alps-bg-alt)",
                                    color: "var(--alps-text)",
                                    fontFamily: "var(--font-sans)",
                                  }}
                                />
                              )}
                              <div style={{ display: "flex", gap: "6px" }}>
                                <button
                                  onClick={() => handleSuggestionApprove(sug.id, editText)}
                                  style={{
                                    padding: "6px 12px",
                                    background: "var(--alps-success)",
                                    color: "white",
                                    border: "none",
                                    borderRadius: "3px",
                                    cursor: "pointer",
                                    fontSize: "11px",
                                    fontWeight: "600",
                                    flex: 1,
                                  }}
                                >
                                  ✓ Approve
                                </button>
                                {!showRejectInput ? (
                                  <button
                                    onClick={() => setShowRejectInput(true)}
                                    style={{
                                      padding: "6px 12px",
                                      background: "transparent",
                                      color: "var(--alps-danger)",
                                      border: "1px solid var(--alps-danger)",
                                      borderRadius: "3px",
                                      cursor: "pointer",
                                      fontSize: "11px",
                                      flex: 1,
                                    }}
                                  >
                                    ✗ Reject
                                  </button>
                                ) : (
                                  <>
                                    <button
                                      onClick={() => {
                                        if (rejectReason.trim()) {
                                          handleSuggestionReject(sug.id, rejectReason);
                                          setShowRejectInput(false);
                                        }
                                      }}
                                      style={{
                                        padding: "6px 8px",
                                        background: "var(--alps-danger)",
                                        color: "white",
                                        border: "none",
                                        borderRadius: "3px",
                                        cursor: "pointer",
                                        fontSize: "11px",
                                        flex: 1,
                                      }}
                                    >
                                      Send
                                    </button>
                                    <button
                                      onClick={() => setShowRejectInput(false)}
                                      style={{
                                        padding: "6px 8px",
                                        background: "transparent",
                                        color: "var(--alps-text-muted)",
                                        border: "1px solid var(--alps-border)",
                                        borderRadius: "3px",
                                        cursor: "pointer",
                                        fontSize: "11px",
                                        flex: 1,
                                      }}
                                    >
                                      Cancel
                                    </button>
                                  </>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {approvedSuggestions.length > 0 && (
                    <div style={{ background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", padding: "16px", display: "grid", gap: "12px" }}>
                      <div style={{ fontSize: "12px", fontWeight: "600", color: "var(--alps-text-muted)", textTransform: "uppercase" }}>
                        {approvedSuggestions.length}
                      </div>
                      <div style={{ fontSize: "14px", fontWeight: "600", color: "var(--alps-text)" }}>Applied</div>
                      <div style={{ display: "grid", gap: "8px" }}>
                        {approvedSuggestions.map((sug) => (
                          <div key={sug.id} style={{ padding: "8px", background: "var(--alps-bg)", borderRadius: "3px", borderLeft: "3px solid var(--alps-success)", fontSize: "11px" }}>
                            <div style={{ fontWeight: "600", marginBottom: "2px" }}>{window.LINEAR_TICKETS[sug.ticketId]?.id}</div>
                            <div style={{ color: "var(--alps-text-muted)", fontSize: "10px" }}>{sug.suggestion}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {screen === "progress" && (() => {
              const allTickets = Object.values(window.LINEAR_TICKETS);
              const today = new Date("2026-05-01");
              const isOverdue = (t) => {
                if (!t.dueDate || t.status === "done") return false;
                return new Date(t.dueDate) < today;
              };
              // Augment tickets with cycle, dueDate, gate if missing (deterministic from ticket order)
              const ticketGate = (t) => {
                const n = parseInt(t.id.replace("LIN-",""), 10);
                if (n <= 204) return "business";
                if (n <= 209) return "product";
                return "tech";
              };
              const ticketCycle = (t) => {
                const n = parseInt(t.id.replace("LIN-",""), 10);
                if (n <= 204) return "S11";
                if (n <= 209) return "S12";
                if (n <= 213) return "S13";
                return "S14";
              };
              const ticketDueDate = (t) => {
                const n = parseInt(t.id.replace("LIN-",""), 10);
                const offset = (n - 201) * 3;
                const d = new Date("2026-04-05");
                d.setDate(d.getDate() + offset);
                return d.toISOString().slice(0,10);
              };
              const enrichedTickets = allTickets.map(t => ({
                ...t,
                gate: ticketGate(t),
                cycle: t.cycle || ticketCycle(t),
                dueDate: t.dueDate || ticketDueDate(t),
              }));

              const cyclesData = (project.cycles || [
                { id: "S11", name: "Sprint 11", startDate: "2026-03-23", endDate: "2026-04-05" },
                { id: "S12", name: "Sprint 12", startDate: "2026-04-06", endDate: "2026-04-19" },
                { id: "S13", name: "Sprint 13", startDate: "2026-04-20", endDate: "2026-05-03" },
                { id: "S14", name: "Sprint 14", startDate: "2026-05-04", endDate: "2026-05-17" },
              ]);

              const filteredTickets = enrichedTickets.filter(t => {
                if (filterCycle !== "all" && t.cycle !== filterCycle) return false;
                if (filterStatus !== "all" && t.status !== filterStatus) return false;
                if (filterPriority !== "all" && t.priority !== filterPriority) return false;
                if (filterAssignee !== "all" && t.assignee !== filterAssignee) return false;
                return true;
              });

              const overdueCount = enrichedTickets.filter(isOverdue).length;
              const blockedCount = enrichedTickets.filter(t => t.status === "blocked").length;
              const blockedByGate = ["business","product","tech"].map(g => ({
                gate: g,
                count: enrichedTickets.filter(t => t.gate === g && t.status === "blocked").length,
              })).sort((a,b) => b.count - a.count)[0];

              const assignees = [...new Set(enrichedTickets.map(t => t.assignee))];
              const selected = selectedTicket ? enrichedTickets.find(t => t.id === selectedTicket) : null;

              const statusColor = (s) => s === "done" ? "var(--alps-success)" : s === "in_progress" ? "var(--alps-accent)" : s === "blocked" ? "var(--alps-danger)" : "var(--alps-text-muted)";
              const priorityColor = (p) => p === "critical" ? "#dc2626" : p === "high" ? "#ea580c" : p === "medium" ? "#ca8a04" : "var(--alps-text-muted)";

              return (
              <div style={{ display: "grid", gap: "20px", maxWidth: "1400px", margin: "0 auto" }}>
                {/* Header */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div>
                    <h2 style={{ fontSize: "22px", fontWeight: "600", margin: "0 0 4px 0" }}>View Progress & Cycles</h2>
                    <div style={{ fontSize: "12px", color: "var(--alps-text-muted)" }}>{project.id} · {project.title}</div>
                  </div>
                  <button
                    onClick={() => { setScreen("dashboard"); window.history.replaceState({}, "", window.location.pathname); }}
                    className="button-secondary"
                  >
                    ← Back to Dashboard
                  </button>
                </div>

                {/* Quick Insights */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px" }}>
                  <div style={{ padding: "14px 16px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "6px", fontWeight: "600", textTransform: "uppercase", letterSpacing: "0.04em" }}>Total Tickets</div>
                    <div style={{ fontSize: "22px", fontWeight: "700", color: "var(--alps-text)" }}>{enrichedTickets.length}</div>
                    <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginTop: "2px" }}>{enrichedTickets.filter(t => t.status === "done").length} done · {Math.round(enrichedTickets.filter(t => t.status === "done").length / enrichedTickets.length * 100)}% complete</div>
                  </div>
                  <div style={{ padding: "14px 16px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "6px", fontWeight: "600", textTransform: "uppercase", letterSpacing: "0.04em" }}>In Progress</div>
                    <div style={{ fontSize: "22px", fontWeight: "700", color: "var(--alps-accent)" }}>{enrichedTickets.filter(t => t.status === "in_progress").length}</div>
                    <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginTop: "2px" }}>active work</div>
                  </div>
                  <div style={{ padding: "14px 16px", background: overdueCount > 0 ? "rgba(220, 38, 38, 0.06)" : "var(--alps-bg-alt)", border: `1px solid ${overdueCount > 0 ? "rgba(220, 38, 38, 0.3)" : "var(--alps-border)"}`, borderRadius: "8px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "6px", fontWeight: "600", textTransform: "uppercase", letterSpacing: "0.04em" }}>Overdue</div>
                    <div style={{ fontSize: "22px", fontWeight: "700", color: overdueCount > 0 ? "#dc2626" : "var(--alps-text-muted)" }}>{overdueCount}</div>
                    <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginTop: "2px" }}>{Math.round(overdueCount / enrichedTickets.length * 100)}% of tickets</div>
                  </div>
                  <div style={{ padding: "14px 16px", background: blockedCount > 0 ? "rgba(220, 38, 38, 0.06)" : "var(--alps-bg-alt)", border: `1px solid ${blockedCount > 0 ? "rgba(220, 38, 38, 0.3)" : "var(--alps-border)"}`, borderRadius: "8px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "6px", fontWeight: "600", textTransform: "uppercase", letterSpacing: "0.04em" }}>Bottleneck</div>
                    <div style={{ fontSize: "22px", fontWeight: "700", color: blockedCount > 0 ? "var(--alps-danger)" : "var(--alps-text-muted)" }}>{blockedByGate?.count || 0}</div>
                    <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginTop: "2px", textTransform: "capitalize" }}>blocked at {blockedByGate?.gate || "—"} gate</div>
                  </div>
                </div>

                {/* Section 1 — Scheduled Cycles */}
                <div style={{ display: "grid", gap: "12px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ fontSize: "13px", fontWeight: "600", color: "var(--alps-text)", textTransform: "uppercase", letterSpacing: "0.04em" }}>Scheduled Cycles</div>
                    <div style={{ fontSize: "11px", color: "var(--alps-text-muted)" }}>Click a cycle to filter tickets</div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: `repeat(${cyclesData.length}, 1fr)`, gap: "12px" }}>
                    {cyclesData.map((cycle) => {
                      const ct = enrichedTickets.filter(t => t.cycle === cycle.id);
                      const done = ct.filter(t => t.status === "done").length;
                      const inProg = ct.filter(t => t.status === "in_progress").length;
                      const blocked = ct.filter(t => t.status === "blocked").length;
                      const pct = ct.length > 0 ? Math.round((done / ct.length) * 100) : 0;
                      const active = filterCycle === cycle.id;
                      return (
                        <div
                          key={cycle.id}
                          onClick={() => setFilterCycle(active ? "all" : cycle.id)}
                          style={{
                            padding: "14px",
                            background: active ? "rgba(37, 99, 235, 0.08)" : "var(--alps-bg-alt)",
                            border: `1px solid ${active ? "var(--alps-accent)" : "var(--alps-border)"}`,
                            borderRadius: "8px",
                            cursor: "pointer",
                            display: "grid",
                            gap: "10px",
                            transition: "all 0.15s",
                          }}
                        >
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ fontSize: "13px", fontWeight: "600", color: "var(--alps-text)" }}>{cycle.name}</div>
                            <div style={{ fontSize: "11px", fontWeight: "700", color: active ? "var(--alps-accent)" : "var(--alps-text)" }}>{pct}%</div>
                          </div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontFamily: "monospace" }}>{cycle.startDate} → {cycle.endDate}</div>
                          <div style={{ height: "4px", background: "var(--alps-bg)", borderRadius: "2px", overflow: "hidden" }}>
                            <div style={{ height: "100%", background: "var(--alps-accent)", width: `${pct}%`, transition: "width 0.3s" }}></div>
                          </div>
                          <div style={{ display: "flex", gap: "10px", fontSize: "10px", fontWeight: "600" }}>
                            <span style={{ color: "var(--alps-success)" }}>● {done}</span>
                            <span style={{ color: "var(--alps-accent)" }}>● {inProg}</span>
                            {blocked > 0 && <span style={{ color: "var(--alps-danger)" }}>● {blocked}</span>}
                            <span style={{ color: "var(--alps-text-muted)", marginLeft: "auto" }}>{ct.length} total</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Filters bar */}
                <div style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 14px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", flexWrap: "wrap" }}>
                  <div style={{ fontSize: "11px", fontWeight: "600", color: "var(--alps-text-muted)", textTransform: "uppercase", letterSpacing: "0.04em" }}>Filters</div>
                  {[
                    { label: "Cycle", value: filterCycle, set: setFilterCycle, options: [["all","All cycles"], ...cyclesData.map(c => [c.id, c.name])] },
                    { label: "Status", value: filterStatus, set: setFilterStatus, options: [["all","All status"],["todo","Todo"],["in_progress","In progress"],["blocked","Blocked"],["done","Done"]] },
                    { label: "Priority", value: filterPriority, set: setFilterPriority, options: [["all","All priority"],["critical","Critical"],["high","High"],["medium","Medium"],["low","Low"]] },
                    { label: "Assignee", value: filterAssignee, set: setFilterAssignee, options: [["all","All assignees"], ...assignees.map(a => [a, window.PEOPLE[a]?.fullName || a])] },
                  ].map(({ label, value, set, options }) => (
                    <select key={label} value={value} onChange={(e) => set(e.target.value)} style={{ padding: "6px 10px", fontSize: "12px", background: "var(--alps-bg)", border: "1px solid var(--alps-border)", borderRadius: "4px", color: "var(--alps-text)", cursor: "pointer" }}>
                      {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                    </select>
                  ))}
                  {(filterCycle !== "all" || filterStatus !== "all" || filterPriority !== "all" || filterAssignee !== "all") && (
                    <button
                      onClick={() => { setFilterCycle("all"); setFilterStatus("all"); setFilterPriority("all"); setFilterAssignee("all"); }}
                      style={{ padding: "6px 10px", fontSize: "11px", background: "transparent", border: "none", color: "var(--alps-accent)", cursor: "pointer", fontWeight: "600" }}
                    >Clear all</button>
                  )}
                  <div style={{ marginLeft: "auto", fontSize: "11px", color: "var(--alps-text-muted)" }}>
                    Showing <span style={{ color: "var(--alps-text)", fontWeight: "600" }}>{filteredTickets.length}</span> of {enrichedTickets.length} tickets
                  </div>
                </div>

                {/* Section 2+3 — Tickets table + Detail panel */}
                <div style={{ display: "grid", gridTemplateColumns: selected ? "1fr 380px" : "1fr", gap: "16px", alignItems: "start" }}>
                  {/* Tickets list */}
                  <div style={{ background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", overflow: "hidden" }}>
                    {/* Table header */}
                    <div style={{ display: "grid", gridTemplateColumns: "100px 1fr 100px 90px 70px 100px 80px", gap: "12px", padding: "10px 14px", background: "var(--alps-bg)", borderBottom: "1px solid var(--alps-border)", fontSize: "10px", fontWeight: "600", color: "var(--alps-text-muted)", textTransform: "uppercase", letterSpacing: "0.04em" }}>
                      <div>Ticket</div>
                      <div>Title</div>
                      <div>Status</div>
                      <div>Priority</div>
                      <div>Gate</div>
                      <div>Due</div>
                      <div style={{ textAlign: "right" }}>Assignee</div>
                    </div>
                    {filteredTickets.length === 0 && (
                      <div style={{ padding: "32px", textAlign: "center", color: "var(--alps-text-muted)", fontSize: "13px" }}>
                        No tickets match the current filters.
                      </div>
                    )}
                    {filteredTickets.map((t) => {
                      const overdue = isOverdue(t);
                      const isSelected = selected?.id === t.id;
                      return (
                        <div
                          key={t.id}
                          onClick={() => setSelectedTicket(isSelected ? null : t.id)}
                          style={{
                            display: "grid",
                            gridTemplateColumns: "100px 1fr 100px 90px 70px 100px 80px",
                            gap: "12px",
                            padding: "10px 14px",
                            borderBottom: "1px solid var(--alps-border)",
                            background: isSelected ? "rgba(37, 99, 235, 0.08)" : t.status === "blocked" ? "rgba(220, 38, 38, 0.04)" : "transparent",
                            cursor: "pointer",
                            alignItems: "center",
                            fontSize: "12px",
                            transition: "background 0.15s",
                          }}
                          onMouseEnter={(e) => { if (!isSelected) e.currentTarget.style.background = "var(--alps-bg-hover, rgba(255,255,255,0.03))"; }}
                          onMouseLeave={(e) => { if (!isSelected) e.currentTarget.style.background = t.status === "blocked" ? "rgba(220, 38, 38, 0.04)" : "transparent"; }}
                        >
                          <div style={{ fontFamily: "monospace", fontSize: "11px", color: "var(--alps-text-muted)", fontWeight: "600" }}>{t.id}</div>
                          <div style={{ display: "flex", alignItems: "center", gap: "8px", color: "var(--alps-text)" }}>
                            {t.status === "blocked" && <span style={{ color: "var(--alps-danger)", fontSize: "12px" }} title="Blocked">⚠</span>}
                            <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                          </div>
                          <div>
                            <span style={{
                              fontSize: "10px",
                              fontWeight: "600",
                              color: statusColor(t.status),
                              padding: "2px 8px",
                              background: t.status === "done" ? "rgba(34, 197, 94, 0.12)" : t.status === "in_progress" ? "rgba(37, 99, 235, 0.12)" : t.status === "blocked" ? "rgba(220, 38, 38, 0.12)" : "rgba(148, 163, 184, 0.12)",
                              borderRadius: "3px",
                              textTransform: "uppercase",
                              letterSpacing: "0.04em",
                            }}>{t.status.replace("_", " ")}</span>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                            <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: priorityColor(t.priority) }}></span>
                            <span style={{ textTransform: "capitalize", color: "var(--alps-text)", fontSize: "11px" }}>{t.priority}</span>
                          </div>
                          <div style={{ fontSize: "10px", textTransform: "uppercase", color: "var(--alps-text-muted)", fontWeight: "600", letterSpacing: "0.04em" }}>{t.gate}</div>
                          <div style={{ fontSize: "11px", fontFamily: "monospace", color: overdue ? "#dc2626" : "var(--alps-text-muted)", fontWeight: overdue ? "600" : "400" }}>
                            {overdue && "⚠ "}{t.dueDate?.slice(5) || "—"}
                          </div>
                          <div style={{ display: "flex", justifyContent: "flex-end" }}>
                            <Avatar person={t.assignee} size={22} />
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Detail panel */}
                  {selected && (
                    <div style={{ position: "sticky", top: "16px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", padding: "18px", display: "grid", gap: "16px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontFamily: "monospace", fontWeight: "600", marginBottom: "4px" }}>{selected.id}</div>
                          <div style={{ fontSize: "14px", fontWeight: "600", color: "var(--alps-text)", lineHeight: "1.35" }}>{selected.title}</div>
                        </div>
                        <button onClick={() => setSelectedTicket(null)} style={{ background: "transparent", border: "none", color: "var(--alps-text-muted)", fontSize: "16px", cursor: "pointer", padding: "0 4px" }}>✕</button>
                      </div>

                      {selected.status === "blocked" && (
                        <div style={{ padding: "10px 12px", background: "rgba(220, 38, 38, 0.08)", border: "1px solid rgba(220, 38, 38, 0.3)", borderRadius: "6px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
                          <div style={{ color: "var(--alps-danger)", fontSize: "12px", lineHeight: "1.2" }}>⚠</div>
                          <div>
                            <div style={{ fontSize: "11px", fontWeight: "600", color: "var(--alps-danger)", marginBottom: "2px" }}>Blocked</div>
                            <div style={{ fontSize: "11px", color: "var(--alps-text)", lineHeight: "1.4" }}>{selected.blockedBy || "Awaiting upstream dependency"}</div>
                          </div>
                        </div>
                      )}

                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 16px" }}>
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: "600", letterSpacing: "0.04em" }}>Status</div>
                          <div style={{ fontSize: "12px", fontWeight: "600", color: statusColor(selected.status), textTransform: "capitalize" }}>{selected.status.replace("_", " ")}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: "600", letterSpacing: "0.04em" }}>Priority</div>
                          <div style={{ fontSize: "12px", fontWeight: "600", color: priorityColor(selected.priority), textTransform: "capitalize" }}>{selected.priority}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: "600", letterSpacing: "0.04em" }}>Assignee</div>
                          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                            <Avatar person={selected.assignee} size={18} />
                            <div style={{ fontSize: "11px", color: "var(--alps-text)" }}>{window.PEOPLE[selected.assignee]?.fullName}</div>
                          </div>
                        </div>
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: "600", letterSpacing: "0.04em" }}>Due Date</div>
                          <div style={{ fontSize: "11px", fontFamily: "monospace", color: isOverdue(selected) ? "#dc2626" : "var(--alps-text)", fontWeight: isOverdue(selected) ? "600" : "400" }}>
                            {isOverdue(selected) && "⚠ "}{selected.dueDate || "—"}
                          </div>
                        </div>
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: "600", letterSpacing: "0.04em" }}>Linked Gate</div>
                          <div style={{ fontSize: "11px", fontWeight: "600", color: "var(--alps-text)", textTransform: "capitalize", padding: "2px 8px", background: "var(--alps-bg)", borderRadius: "3px", display: "inline-block" }}>{selected.gate}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: "600", letterSpacing: "0.04em" }}>Cycle</div>
                          <div style={{ fontSize: "11px", color: "var(--alps-text)" }}>{cyclesData.find(c => c.id === selected.cycle)?.name || selected.cycle}</div>
                        </div>
                      </div>

                      <div>
                        <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "6px", fontWeight: "600", letterSpacing: "0.04em" }}>Description</div>
                        <div style={{ fontSize: "12px", color: "var(--alps-text)", lineHeight: "1.5", padding: "10px 12px", background: "var(--alps-bg)", borderRadius: "4px" }}>
                          {selected.description}
                        </div>
                      </div>

                      <div>
                        <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "6px", fontWeight: "600", letterSpacing: "0.04em" }}>Git Activity</div>
                        <div style={{ display: "grid", gap: "6px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "8px 10px", background: "var(--alps-bg)", borderRadius: "4px", fontSize: "11px" }}>
                            <span style={{ fontFamily: "monospace", color: "var(--alps-accent)", fontWeight: "600" }}>MR {selected.gitlabIssue || "—"}</span>
                            <span style={{ color: "var(--alps-text-muted)", flex: 1 }}>{selected.status === "done" ? "merged" : selected.status === "in_progress" ? "open · 2 commits ahead" : "draft"}</span>
                          </div>
                          {selected.progress > 0 && (
                            <div style={{ padding: "8px 10px", background: "var(--alps-bg)", borderRadius: "4px" }}>
                              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "4px" }}>
                                <span>Progress</span>
                                <span style={{ fontWeight: "600", color: "var(--alps-text)" }}>{selected.progress}%</span>
                              </div>
                              <div style={{ height: "4px", background: "var(--alps-bg-alt)", borderRadius: "2px", overflow: "hidden" }}>
                                <div style={{ height: "100%", background: statusColor(selected.status), width: `${selected.progress}%` }}></div>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>

                      {selected.blockedBy && (
                        <div>
                          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "6px", fontWeight: "600", letterSpacing: "0.04em" }}>Dependencies</div>
                          <div style={{ fontSize: "11px", padding: "8px 10px", background: "var(--alps-bg)", borderRadius: "4px", color: "var(--alps-text)" }}>
                            Blocked by: <span style={{ color: "var(--alps-danger)", fontWeight: "600" }}>{selected.blockedBy}</span>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
              );
            })()}
          </main>
        </div>
      );
    }

    function Avatar({ person, size = 24 }) {
      const personData = window.PEOPLE[person];
      return (
        <div
          style={{
            width: size,
            height: size,
            borderRadius: "4px",
            background: `hsl(${Math.abs(person.charCodeAt(0) * 17) % 360}, 70%, 60%)`,
            color: "white",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            fontSize: size * 0.5,
            fontWeight: "600",
          }}
        >
          {personData?.initials || "?"}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
