<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress & Cycles — ALPS</title>
  <style>
    :root {
      --alps-primary: #2563eb;
      --alps-accent: #0891b2;
      --alps-success: #10b981;
      --alps-warning: #f59e0b;
      --alps-danger: #ef4444;
      --alps-bg: #0f172a;
      --alps-bg-alt: #1a2847;
      --alps-bg-hover: #243658;
      --alps-text: #f0f0f0;
      --alps-text-muted: #9ca3af;
      --alps-border: #374151;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; font-family: var(--font-sans); }
    .alps-app { background: var(--alps-bg); color: var(--alps-text); min-height: 100vh; display: flex; flex-direction: column; }
    .alps-header {
      background: var(--alps-bg-alt); border-bottom: 1px solid var(--alps-border);
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
      gap: 24px; position: sticky; top: 0; z-index: 100;
    }
    .alps-main { flex: 1; padding: 24px; overflow-y: auto; }
    .button-secondary {
      padding: 8px 12px; background: transparent; color: var(--alps-text-muted);
      border: 1px solid var(--alps-border); border-radius: 4px; cursor: pointer;
      font-size: 12px; font-weight: 600; transition: all 0.2s;
    }
    .button-secondary:hover { color: var(--alps-text); border-color: var(--alps-text); }
    select { font-family: var(--font-sans); }
    select:focus { outline: 1px solid var(--alps-primary); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="attachments.jsx"></script>
  <script type="text/babel" src="discussion-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Project Selection Logic ---
    const urlParams = new URLSearchParams(window.location.search);
    const projectIdFromUrl = urlParams.get('projectId');
    const sprintIdFromUrl = urlParams.get('sprintId');
    const projectIdFromStorage = localStorage.getItem('alpsActiveProjectId');
    const projectId = projectIdFromUrl || projectIdFromStorage || "ALPS-218";
    const PROJECT = window.PROJECTS.find(p => p.id === projectId) || window.PROJECT;

    // --- Data ---

    const PEOPLE = window.PEOPLE;

    // Map SPRINTS to CYCLES display format
    const projectSprints = window.SPRINTS.filter(s => s.projectId === projectId);
    const CYCLES = projectSprints.map(sprint => ({
      id: sprint.id,
      name: sprint.name,
      startDate: sprint.startDate,
      endDate: sprint.endDate
    }));

    // Filter LINEAR_TICKETS by projectId and optionally by sprintId
    const allTickets = Object.values(window.LINEAR_TICKETS);
    const projectTickets = allTickets.filter(t => t.projectId === projectId);
    const filteredBySprintTickets = sprintIdFromUrl 
      ? projectTickets.filter(t => t.sprintId === sprintIdFromUrl)
      : projectTickets;
    const TICKETS = filteredBySprintTickets.map(t => ({
      id: t.id,
      title: t.title,
      status: t.status,
      priority: t.priority,
      assignee: t.assignee,
      gate: t.gate || "business",
      cycle: t.sprintId,
      dueDate: t.dueDate || t.created,
      description: t.description,
      gitlab: t.gitlabIssue || "—",
      progress: t.progress || 0,
      blockedBy: t.blockedBy
    }));

    // --- Helpers ---
    const TODAY = new Date("2026-05-01");
    const isOverdue = (t) => {
      if (!t.dueDate || t.status === "done") return false;
      return new Date(t.dueDate) < TODAY;
    };
    const statusColor = (s) => s === "done" ? "var(--alps-success)" : s === "in_progress" ? "var(--alps-primary)" : s === "blocked" ? "var(--alps-danger)" : "var(--alps-text-muted)";
    const statusBg = (s) => s === "done" ? "rgba(16, 185, 129, 0.12)" : s === "in_progress" ? "rgba(37, 99, 235, 0.14)" : s === "blocked" ? "rgba(239, 68, 68, 0.12)" : "rgba(148, 163, 184, 0.1)";
    const priorityColor = (p) => p === "critical" ? "#dc2626" : p === "high" ? "#ea580c" : p === "medium" ? "#ca8a04" : "var(--alps-text-muted)";

    function Avatar({ person, size = 22 }) {
      const p = PEOPLE[person];
      const hue = Math.abs((person || "x").charCodeAt(0) * 17) % 360;
      return (
        <div style={{
          width: size, height: size, borderRadius: "4px",
          background: `hsl(${hue}, 55%, 50%)`, color: "white",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: size * 0.45, fontWeight: 600,
        }}>{p?.initials || "?"}</div>
      );
    }

    function App() {
      const [filterCycle, setFilterCycle] = useState("all");
      const [filterStatus, setFilterStatus] = useState("all");
      const [filterPriority, setFilterPriority] = useState("all");
      const [filterAssignee, setFilterAssignee] = useState("all");
      const [search, setSearch] = useState("");
      const [selectedId, setSelectedId] = useState(null);
      const [viewMode, setViewMode] = useState("list"); // list or calendar
      const [currentMonth, setCurrentMonth] = useState(new Date());

      const filtered = TICKETS.filter(t => {
        if (filterCycle !== "all" && t.cycle !== filterCycle) return false;
        if (filterStatus !== "all" && t.status !== filterStatus) return false;
        if (filterPriority !== "all" && t.priority !== filterPriority) return false;
        if (filterAssignee !== "all" && t.assignee !== filterAssignee) return false;
        if (search && !(t.title.toLowerCase().includes(search.toLowerCase()) || t.id.toLowerCase().includes(search.toLowerCase()))) return false;
        return true;
      });

      const overdueCount = TICKETS.filter(isOverdue).length;
      const blockedCount = TICKETS.filter(t => t.status === "blocked").length;
      const doneCount = TICKETS.filter(t => t.status === "done").length;
      const inProgCount = TICKETS.filter(t => t.status === "in_progress").length;
      const blockedByGate = ["business","product","tech"].map(g => ({
        gate: g,
        count: TICKETS.filter(t => t.gate === g && t.status === "blocked").length,
      })).sort((a,b) => b.count - a.count)[0];

      const assignees = [...new Set(TICKETS.map(t => t.assignee))];
      const selected = selectedId ? TICKETS.find(t => t.id === selectedId) : null;

      const filtersActive = filterCycle !== "all" || filterStatus !== "all" || filterPriority !== "all" || filterAssignee !== "all" || search !== "";

      // Calendar helpers
      const getDaysInMonth = (date) => {
        return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      };

      const getFirstDayOfMonth = (date) => {
        return new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      };

      const formatDate = (date) => {
        return date.toISOString().split('T')[0];
      };

      const getTicketsForDate = (dateStr) => {
        return filtered.filter(t => {
          if (!t.dueDate) return false;
          return formatDate(new Date(t.dueDate)) === dateStr;
        });
      };

      const handlePrevMonth = () => {
        setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1));
      };

      const handleNextMonth = () => {
        setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1));
      };

      const handleToday = () => {
        setCurrentMonth(new Date());
      };

      const monthName = currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' });

      // Generate calendar days
      const daysInMonth = getDaysInMonth(currentMonth);
      const firstDay = getFirstDayOfMonth(currentMonth);
      const calendarDays = [];

      for (let i = 0; i < firstDay; i++) {
        calendarDays.push(null);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
        calendarDays.push(date);
      }

      return (
        <div className="alps-app">
          <header className="alps-header">
            <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                <div style={{ width: "24px", height: "24px", borderRadius: "5px", background: "var(--alps-primary)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", fontWeight: 700, color: "white" }}>A</div>
                <div style={{ fontSize: "13px", fontWeight: 600 }}>ALPS</div>
              </div>
              <div style={{ width: "1px", height: "20px", background: "var(--alps-border)" }}></div>
              <div>
                <div style={{ fontSize: "12px", color: "var(--alps-text-muted)", marginBottom: "2px" }}>{PROJECT.id} · {PROJECT.title}</div>
                <div style={{ fontSize: "15px", fontWeight: 600 }}>
                  Progress &amp; Cycles
                  {sprintIdFromUrl && (
                    <span style={{ fontSize: "12px", color: "var(--alps-text-muted)", marginLeft: "8px" }}>
                      · {window.SPRINTS.find(s => s.id === sprintIdFromUrl)?.name || "Sprint"}
                    </span>
                  )}
                </div>
              </div>
            </div>
            <button onClick={() => { if (document.referrer) { window.close(); } else { window.location.href = "alps-prototype.html"; } }} className="button-secondary">← Back to Dashboard</button>
          </header>

          <main className="alps-main">
            <div style={{ display: "grid", gap: "20px", maxWidth: "1400px", margin: "0 auto" }}>
              {/* Quick Insights */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px" }}>
                <InsightCard label="Total Tickets" value={TICKETS.length} sub={`${doneCount} done · ${Math.round(TICKETS.length > 0 ? (doneCount / TICKETS.length * 100) : 0)}% complete`} />
                <InsightCard label="In Progress" value={inProgCount} sub="active work" valueColor="var(--alps-primary)" />
                <InsightCard label="Overdue" value={overdueCount} sub={`${Math.round(TICKETS.length > 0 ? (overdueCount / TICKETS.length * 100) : 0)}% of tickets`} valueColor={overdueCount > 0 ? "#dc2626" : undefined} alert={overdueCount > 0} />
                <InsightCard label="Bottleneck" value={blockedByGate?.count || 0} sub={`blocked at ${blockedByGate?.gate || "—"} gate`} valueColor={blockedCount > 0 ? "var(--alps-danger)" : undefined} alert={blockedCount > 0} />
              </div>

              {/* Sprint Resource Metrics - Only show when viewing a sprint */}
              {sprintIdFromUrl && (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "12px", padding: "16px", background: "rgba(8, 145, 178, 0.08)", border: "1px solid rgba(8, 145, 178, 0.2)", borderRadius: "8px" }}>
                  <div style={{ display: "grid", gap: "4px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Velocity</div>
                    <div style={{ fontSize: "18px", fontWeight: 700, color: "var(--alps-accent)" }}>{doneCount}</div>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)" }}>completed tickets</div>
                  </div>
                  <div style={{ display: "grid", gap: "4px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Capacity</div>
                    <div style={{ fontSize: "18px", fontWeight: 700, color: "var(--alps-primary)" }}>{TICKETS.length}</div>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)" }}>total tickets</div>
                  </div>
                  <div style={{ display: "grid", gap: "4px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Burndown</div>
                    <div style={{ fontSize: "18px", fontWeight: 700, color: "var(--alps-success)" }}>{TICKETS.length > 0 ? Math.round((doneCount / TICKETS.length) * 100) : 0}%</div>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)" }}>progress</div>
                  </div>
                  <div style={{ display: "grid", gap: "4px" }}>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Remaining</div>
                    <div style={{ fontSize: "18px", fontWeight: 700, color: inProgCount > 0 ? "var(--alps-warning)" : "var(--alps-text-muted)" }}>{TICKETS.length - doneCount}</div>
                    <div style={{ fontSize: "10px", color: "var(--alps-text-muted)" }}>tickets left</div>
                  </div>
                </div>
              )}

              {/* Section 1 — Scheduled Cycles */}
              <div style={{ display: "grid", gap: "12px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ fontSize: "12px", fontWeight: 600, color: "var(--alps-text)", textTransform: "uppercase", letterSpacing: "0.06em" }}>Scheduled Cycles</div>
                  <div style={{ fontSize: "11px", color: "var(--alps-text-muted)" }}>Click a cycle to filter tickets</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: `repeat(${CYCLES.length}, 1fr)`, gap: "12px" }}>
                  {CYCLES.map(cycle => {
                    const ct = TICKETS.filter(t => t.cycle === cycle.id);
                    const done = ct.filter(t => t.status === "done").length;
                    const inProg = ct.filter(t => t.status === "in_progress").length;
                    const blocked = ct.filter(t => t.status === "blocked").length;
                    const pct = ct.length > 0 ? Math.round((done / ct.length) * 100) : 0;
                    const active = filterCycle === cycle.id;
                    return (
                      <div
                        key={cycle.id}
                        onClick={() => setFilterCycle(active ? "all" : cycle.id)}
                        style={{
                          padding: "14px",
                          background: active ? "rgba(37, 99, 235, 0.1)" : "var(--alps-bg-alt)",
                          border: `1px solid ${active ? "var(--alps-primary)" : "var(--alps-border)"}`,
                          borderRadius: "8px", cursor: "pointer",
                          display: "grid", gap: "10px", transition: "all 0.15s",
                        }}
                      >
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div>
                            <div style={{ fontSize: "13px", fontWeight: 600 }}>{cycle.name}</div>
                            <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", marginTop: "2px" }}>{PROJECT.id} · {PROJECT.title}</div>
                          </div>
                          <div style={{ fontSize: "12px", fontWeight: 700, color: active ? "var(--alps-primary)" : "var(--alps-text)" }}>{pct}%</div>
                        </div>
                        <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontFamily: "monospace" }}>{cycle.startDate} → {cycle.endDate}</div>
                        <div style={{ height: "4px", background: "var(--alps-bg)", borderRadius: "2px", overflow: "hidden" }}>
                          <div style={{ height: "100%", background: "var(--alps-primary)", width: `${pct}%`, transition: "width 0.3s" }}></div>
                        </div>
                        <div style={{ display: "flex", gap: "10px", fontSize: "10px", fontWeight: 600 }}>
                          <span style={{ color: "var(--alps-success)" }}>● {done}</span>
                          <span style={{ color: "var(--alps-primary)" }}>● {inProg}</span>
                          {blocked > 0 && <span style={{ color: "var(--alps-danger)" }}>● {blocked}</span>}
                          <span style={{ color: "var(--alps-text-muted)", marginLeft: "auto" }}>{ct.length} total</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Filters bar */}
              <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 14px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", flexWrap: "wrap" }}>
                <div style={{ display: "flex", gap: "6px" }}>
                  <button
                    onClick={() => setViewMode("list")}
                    style={{
                      padding: "6px 12px",
                      background: viewMode === "list" ? "var(--alps-primary)" : "transparent",
                      color: viewMode === "list" ? "white" : "var(--alps-text-muted)",
                      border: "1px solid var(--alps-border)",
                      borderRadius: "4px",
                      cursor: "pointer",
                      fontSize: "12px",
                      fontWeight: "600",
                      fontFamily: "var(--font-sans)",
                    }}
                  >
                    List
                  </button>
                  <button
                    onClick={() => setViewMode("calendar")}
                    style={{
                      padding: "6px 12px",
                      background: viewMode === "calendar" ? "var(--alps-primary)" : "transparent",
                      color: viewMode === "calendar" ? "white" : "var(--alps-text-muted)",
                      border: "1px solid var(--alps-border)",
                      borderRadius: "4px",
                      cursor: "pointer",
                      fontSize: "12px",
                      fontWeight: "600",
                      fontFamily: "var(--font-sans)",
                    }}
                  >
                    📅 Calendar
                  </button>
                </div>
                <div style={{ width: "1px", height: "20px", background: "var(--alps-border)" }}></div>
                <input
                  type="text" placeholder="Search tickets..."
                  value={search} onChange={(e) => setSearch(e.target.value)}
                  style={{ padding: "6px 10px", fontSize: "12px", background: "var(--alps-bg)", border: "1px solid var(--alps-border)", borderRadius: "4px", color: "var(--alps-text)", width: "200px", fontFamily: "var(--font-sans)", outline: "none" }}
                />
                <div style={{ width: "1px", height: "20px", background: "var(--alps-border)" }}></div>
                {[
                  { value: filterCycle, set: setFilterCycle, options: [["all","All cycles"], ...CYCLES.map(c => [c.id, c.name])] },
                  { value: filterStatus, set: setFilterStatus, options: [["all","All status"],["todo","Todo"],["in_progress","In progress"],["blocked","Blocked"],["done","Done"]] },
                  { value: filterPriority, set: setFilterPriority, options: [["all","All priority"],["critical","Critical"],["high","High"],["medium","Medium"],["low","Low"]] },
                  { value: filterAssignee, set: setFilterAssignee, options: [["all","All assignees"], ...assignees.map(a => [a, PEOPLE[a]?.fullName || a])] },
                ].map(({ value, set, options }, i) => (
                  <select key={i} value={value} onChange={(e) => set(e.target.value)} style={{ padding: "6px 10px", fontSize: "12px", background: "var(--alps-bg)", border: "1px solid var(--alps-border)", borderRadius: "4px", color: "var(--alps-text)", cursor: "pointer", outline: "none" }}>
                    {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                  </select>
                ))}
                {filtersActive && (
                  <button
                    onClick={() => { setFilterCycle("all"); setFilterStatus("all"); setFilterPriority("all"); setFilterAssignee("all"); setSearch(""); }}
                    style={{ padding: "6px 10px", fontSize: "11px", background: "transparent", border: "none", color: "var(--alps-primary)", cursor: "pointer", fontWeight: 600 }}
                  >Clear all</button>
                )}
                <div style={{ marginLeft: "auto", fontSize: "11px", color: "var(--alps-text-muted)" }}>
                  Showing <span style={{ color: "var(--alps-text)", fontWeight: 600 }}>{filtered.length}</span> of {TICKETS.length}
                </div>
              </div>

              {/* Tickets table + Detail panel OR Calendar view */}
              {viewMode === "list" ? (
              <div style={{ display: "grid", gridTemplateColumns: selected ? "1fr 380px" : "1fr", gap: "16px", alignItems: "start" }}>
                <div style={{ background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", overflow: "hidden" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "100px 1fr 100px 90px 70px 100px 60px", gap: "12px", padding: "10px 14px", background: "var(--alps-bg)", borderBottom: "1px solid var(--alps-border)", fontSize: "10px", fontWeight: 600, color: "var(--alps-text-muted)", textTransform: "uppercase", letterSpacing: "0.04em" }}>
                    <div>Ticket</div><div>Title</div><div>Status</div><div>Priority</div><div>Gate</div><div>Due</div><div style={{ textAlign: "right" }}>Owner</div>
                  </div>
                  {filtered.length === 0 && (
                    <div style={{ padding: "32px", textAlign: "center", color: "var(--alps-text-muted)", fontSize: "13px" }}>No tickets match the current filters.</div>
                  )}
                  {filtered.map(t => {
                    const overdue = isOverdue(t);
                    const isSelected = selected?.id === t.id;
                    return (
                      <div
                        key={t.id}
                        onClick={() => setSelectedId(isSelected ? null : t.id)}
                        style={{
                          display: "grid",
                          gridTemplateColumns: "100px 1fr 100px 90px 70px 100px 60px",
                          gap: "12px", padding: "10px 14px",
                          borderBottom: "1px solid var(--alps-border)",
                          background: isSelected ? "rgba(37, 99, 235, 0.08)" : t.status === "blocked" ? "rgba(239, 68, 68, 0.04)" : "transparent",
                          cursor: "pointer", alignItems: "center",
                          fontSize: "12px", transition: "background 0.15s",
                        }}
                        onMouseEnter={(e) => { if (!isSelected) e.currentTarget.style.background = "rgba(255,255,255,0.025)"; }}
                        onMouseLeave={(e) => { if (!isSelected) e.currentTarget.style.background = t.status === "blocked" ? "rgba(239, 68, 68, 0.04)" : "transparent"; }}
                      >
                        <div style={{ fontFamily: "monospace", fontSize: "11px", color: "var(--alps-text-muted)", fontWeight: 600 }}>{t.id}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: "8px", color: "var(--alps-text)", overflow: "hidden" }}>
                          {t.status === "blocked" && <span style={{ color: "var(--alps-danger)" }}>⚠</span>}
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.title}</span>
                        </div>
                        <div>
                          <span style={{ fontSize: "10px", fontWeight: 600, color: statusColor(t.status), padding: "2px 8px", background: statusBg(t.status), borderRadius: "3px", textTransform: "uppercase", letterSpacing: "0.04em" }}>{t.status.replace("_", " ")}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                          <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: priorityColor(t.priority) }}></span>
                          <span style={{ textTransform: "capitalize", fontSize: "11px" }}>{t.priority}</span>
                        </div>
                        <div style={{ fontSize: "10px", textTransform: "uppercase", color: "var(--alps-text-muted)", fontWeight: 600, letterSpacing: "0.04em" }}>{t.gate}</div>
                        <div style={{ fontSize: "11px", fontFamily: "monospace", color: overdue ? "#dc2626" : "var(--alps-text-muted)", fontWeight: overdue ? 600 : 400 }}>{overdue && "⚠ "}{t.dueDate?.slice(5) || "—"}</div>
                        <div style={{ display: "flex", justifyContent: "flex-end" }}><Avatar person={t.assignee} size={22} /></div>
                      </div>
                    );
                  })}
                </div>

                {/* Detail panel */}
                {selected && <DetailPanel ticket={selected} onClose={() => setSelectedId(null)} />}
              </div>
              ) : (
              <div style={{ display: "grid", gridTemplateColumns: selected ? "1fr 380px" : "1fr", gap: "16px", alignItems: "start" }}>
                <div style={{ background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", padding: "16px" }}>
                {/* Calendar Navigation */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                  <button
                    onClick={handlePrevMonth}
                    style={{
                      padding: "6px 10px",
                      background: "transparent",
                      border: "1px solid var(--alps-border)",
                      borderRadius: "4px",
                      color: "var(--alps-text-muted)",
                      cursor: "pointer",
                      fontSize: "12px",
                      fontFamily: "var(--font-sans)",
                    }}
                  >
                    ← Prev
                  </button>
                  <div style={{ fontSize: "16px", fontWeight: "600", color: "var(--alps-text)", minWidth: "180px", textAlign: "center" }}>
                    {monthName}
                  </div>
                  <button
                    onClick={handleNextMonth}
                    style={{
                      padding: "6px 10px",
                      background: "transparent",
                      border: "1px solid var(--alps-border)",
                      borderRadius: "4px",
                      color: "var(--alps-text-muted)",
                      cursor: "pointer",
                      fontSize: "12px",
                      fontFamily: "var(--font-sans)",
                    }}
                  >
                    Next →
                  </button>
                  <button
                    onClick={handleToday}
                    style={{
                      padding: "6px 10px",
                      background: "var(--alps-primary)",
                      color: "white",
                      border: "none",
                      borderRadius: "4px",
                      cursor: "pointer",
                      fontSize: "12px",
                      fontWeight: "600",
                      fontFamily: "var(--font-sans)",
                    }}
                  >
                    Today
                  </button>
                </div>

                {/* Calendar Grid */}
                <div style={{ display: "grid", gap: "12px" }}>
                  {/* Day headers */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "4px", marginBottom: "8px" }}>
                    {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(day => (
                      <div key={day} style={{ textAlign: "center", fontSize: "11px", fontWeight: "600", color: "var(--alps-text-muted)", padding: "8px 0" }}>
                        {day}
                      </div>
                    ))}
                  </div>

                  {/* Calendar grid */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "4px" }}>
                    {calendarDays.map((date, idx) => {
                      if (!date) {
                        return <div key={`empty-${idx}`} style={{ aspectRatio: "1", background: "var(--alps-bg)" }} />;
                      }

                      const dateStr = formatDate(date);
                      const dayTickets = getTicketsForDate(dateStr);
                      const isToday = formatDate(new Date()) === dateStr;
                      const isCurrentMonth = date.getMonth() === currentMonth.getMonth();

                      return (
                        <div
                          key={dateStr}
                          style={{
                            aspectRatio: "1",
                            padding: "8px",
                            background: isCurrentMonth ? "var(--alps-bg)" : "var(--alps-bg-alt)",
                            border: isToday ? "2px solid var(--alps-primary)" : "1px solid var(--alps-border)",
                            borderRadius: "4px",
                            display: "flex",
                            flexDirection: "column",
                            gap: "4px",
                            position: "relative",
                            overflow: "hidden",
                          }}
                        >
                          <div style={{ fontSize: "11px", fontWeight: "600", color: isToday ? "var(--alps-primary)" : "var(--alps-text)" }}>
                            {date.getDate()}
                          </div>

                          {dayTickets.length > 0 && (
                            <div style={{ display: "grid", gap: "2px", flex: 1, minHeight: 0, overflow: "auto" }}>
                              {dayTickets.map(t => (
                                <div
                                  key={t.id}
                                  onClick={() => setSelectedId(t.id)}
                                  style={{
                                    fontSize: "7px",
                                    padding: "2px 3px",
                                    background: statusBg(t.status),
                                    color: statusColor(t.status),
                                    borderRadius: "2px",
                                    overflow: "hidden",
                                    textOverflow: "ellipsis",
                                    whiteSpace: "nowrap",
                                    fontWeight: "600",
                                    cursor: "pointer",
                                    transition: "all 0.15s",
                                  }}
                                  onMouseEnter={(e) => {
                                    e.currentTarget.style.background = statusColor(t.status);
                                    e.currentTarget.style.color = "white";
                                  }}
                                  onMouseLeave={(e) => {
                                    e.currentTarget.style.background = statusBg(t.status);
                                    e.currentTarget.style.color = statusColor(t.status);
                                  }}
                                  title={`${t.id}: ${t.title}`}
                                >
                                  {t.id}: {t.title}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                </div>

                {/* Detail panel */}
                {selected && <DetailPanel ticket={selected} onClose={() => setSelectedId(null)} />}
              </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    function InsightCard({ label, value, sub, valueColor, alert }) {
      return (
        <div style={{
          padding: "14px 16px",
          background: alert ? "rgba(239, 68, 68, 0.06)" : "var(--alps-bg-alt)",
          border: `1px solid ${alert ? "rgba(239, 68, 68, 0.3)" : "var(--alps-border)"}`,
          borderRadius: "8px",
        }}>
          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "6px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</div>
          <div style={{ fontSize: "22px", fontWeight: 700, color: valueColor || "var(--alps-text)" }}>{value}</div>
          <div style={{ fontSize: "11px", color: "var(--alps-text-muted)", marginTop: "2px", textTransform: "capitalize" }}>{sub}</div>
        </div>
      );
    }

    function DetailPanel({ ticket: t, onClose }) {
      const [isEditing, setIsEditing] = useState(false);
      const [editedTicket, setEditedTicket] = useState(null);
      const [errors, setErrors] = useState({});
      
      const cycleName = CYCLES.find(c => c.id === t.cycle)?.name || t.cycle;
      const overdue = isOverdue(t);
      const Field = ({ label, children }) => (
        <div>
          <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", textTransform: "uppercase", marginBottom: "4px", fontWeight: 600, letterSpacing: "0.04em" }}>{label}</div>
          <div>{children}</div>
        </div>
      );
      
      const validateTicket = (ticket) => {
        const newErrors = {};
        
        // Title validation
        if (!ticket.title.trim()) {
          newErrors.title = "Title is required";
        }
        
        // Status validation
        if (!["todo", "in_progress", "blocked", "done"].includes(ticket.status)) {
          newErrors.status = "Invalid status";
        }
        
        // Priority validation
        if (!["low", "medium", "high", "critical"].includes(ticket.priority)) {
          newErrors.priority = "Invalid priority";
        }
        
        // Due date validation
        if (ticket.dueDate && isNaN(new Date(ticket.dueDate).getTime())) {
          newErrors.dueDate = "Invalid date format";
        }
        
        return newErrors;
      };
      
      const handleSave = () => {
        // Validation
        const validationErrors = validateTicket(editedTicket);
        setErrors(validationErrors);
        
        if (Object.keys(validationErrors).length > 0) {
          return; // Don't save if there are validation errors
        }
        
        // Update LINEAR_TICKETS in memory
        const ticketKey = editedTicket.id;
        if (window.LINEAR_TICKETS[ticketKey]) {
          window.LINEAR_TICKETS[ticketKey] = {
            ...window.LINEAR_TICKETS[ticketKey],
            title: editedTicket.title,
            description: editedTicket.description,
            status: editedTicket.status,
            priority: editedTicket.priority,
            assignee: editedTicket.assignee,
            dueDate: editedTicket.dueDate
          };
        }
        
        // Update local TICKETS array
        const ticketIndex = TICKETS.findIndex(t => t.id === editedTicket.id);
        if (ticketIndex !== -1) {
          TICKETS[ticketIndex] = { ...TICKETS[ticketIndex], ...editedTicket };
        }
        
        // Exit edit mode and refresh UI
        setIsEditing(false);
        setErrors({});
        onClose();
        // Note: In a real app, we'd trigger a re-render here
      };
      
      const handleCancel = () => {
        setIsEditing(false);
        setEditedTicket(null);
        setErrors({});
      };
      
      const displayTicket = isEditing ? editedTicket : t;
      const hasErrors = Object.keys(errors).length > 0;
      
      return (
        <div style={{ position: "sticky", top: "16px", background: "var(--alps-bg-alt)", border: "1px solid var(--alps-border)", borderRadius: "8px", padding: "18px", display: "grid", gap: "16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: "10px", color: "var(--alps-text-muted)", fontFamily: "monospace", fontWeight: 600, marginBottom: "4px" }}>{displayTicket.id}</div>
              {isEditing ? (
                <div>
                  <input
                    type="text"
                    value={editedTicket.title}
                    onChange={(e) => {
                      setEditedTicket({ ...editedTicket, title: e.target.value });
                      // Clear error on change
                      if (errors.title) {
                        const newErrors = { ...errors };
                        delete newErrors.title;
                        setErrors(newErrors);
                      }
                    }}
                    style={{ fontSize: "14px", fontWeight: 600, color: "var(--alps-text)", lineHeight: 1.35, width: "100%", background: "var(--alps-bg)", border: `1px solid ${errors.title ? "var(--alps-danger)" : "var(--alps-border)"}`, borderRadius: "4px", padding: "6px 8px", fontFamily: "var(--font-sans)" }}
                  />
                  {errors.title && (
                    <div style={{ fontSize: "10px", color: "var(--alps-danger)", marginTop: "4px", fontWeight: 600 }}>{errors.title}</div>
                  )}
                </div>
              ) : (
                <div style={{ fontSize: "14px", fontWeight: 600, color: "var(--alps-text)", lineHeight: 1.35 }}>{displayTicket.title}</div>
              )}
            </div>
            <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
              {!isEditing && (
                <button
                  onClick={() => { setIsEditing(true); setEditedTicket({...t}); }}
                  style={{ padding: "4px 10px", background: "var(--alps-primary)", color: "white", border: "none", borderRadius: "3px", cursor: "pointer", fontSize: "11px", fontWeight: 600 }}
                >
                  Edit
                </button>
              )}
              {isEditing && (
                <>
                  <button
                    onClick={handleSave}
                    disabled={hasErrors}
                    style={{ padding: "4px 10px", background: hasErrors ? "var(--alps-text-muted)" : "var(--alps-success)", color: "white", border: "none", borderRadius: "3px", cursor: hasErrors ? "not-allowed" : "pointer", fontSize: "11px", fontWeight: 600, opacity: hasErrors ? 0.5 : 1 }}
                  >
                    Save
                  </button>
                  <button
                    onClick={handleCancel}
                    style={{ padding: "4px 10px", background: "transparent", color: "var(--alps-text-muted)", border: "1px solid var(--alps-border)", borderRadius: "3px", cursor: "pointer", fontSize: "11px", fontWeight: 600 }}
                  >
                    Cancel
                  </button>
                </>
              )}
              <button onClick={onClose} style={{ background: "transparent", border: "none", color: "var(--alps-text-muted)", fontSize: "16px", cursor: "pointer", padding: "0 4px" }}>✕</button>
            </div>
          </div>

          {displayTicket.status === "blocked" && (
            <div style={{ padding: "10px 12px", background: "rgba(239, 68, 68, 0.08)", border: "1px solid rgba(239, 68, 68, 0.3)", borderRadius: "6px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
              <div style={{ color: "var(--alps-danger)", fontSize: "12px" }}>⚠</div>
              <div>
                <div style={{ fontSize: "11px", fontWeight: 600, color: "var(--alps-danger)", marginBottom: "2px" }}>Blocked</div>
                <div style={{ fontSize: "11px", color: "var(--alps-text)", lineHeight: 1.4 }}>{displayTicket.blockedBy || "Awaiting upstream dependency"}</div>
              </div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 16px" }}>
            <Field label="Status">
              {isEditing ? (
                <div>
                  <select
                    value={editedTicket.status}
                    onChange={(e) => {
                      setEditedTicket({ ...editedTicket, status: e.target.value });
                      // Clear error on change
                      if (errors.status) {
                        const newErrors = { ...errors };
                        delete newErrors.status;
                        setErrors(newErrors);
                      }
                    }}
                    style={{ fontSize: "12px", fontWeight: 600, padding: "4px 8px", background: "var(--alps-bg)", border: `1px solid ${errors.status ? "var(--alps-danger)" : "var(--alps-border)"}`, borderRadius: "3px", color: "var(--alps-text)", cursor: "pointer", fontFamily: "var(--font-sans)" }}
                  >
                    <option value="todo">Todo</option>
                    <option value="in_progress">In Progress</option>
                    <option value="blocked">Blocked</option>
                    <option value="done">Done</option>
                  </select>
                  {errors.status && (
                    <div style={{ fontSize: "10px", color: "var(--alps-danger)", marginTop: "4px", fontWeight: 600 }}>{errors.status}</div>
                  )}
                </div>
              ) : (
                <div style={{ fontSize: "12px", fontWeight: 600, color: statusColor(displayTicket.status), textTransform: "capitalize" }}>{displayTicket.status.replace("_", " ")}</div>
              )}
            </Field>
            <Field label="Priority">
              {isEditing ? (
                <div>
                  <select
                    value={editedTicket.priority}
                    onChange={(e) => {
                      setEditedTicket({ ...editedTicket, priority: e.target.value });
                      // Clear error on change
                      if (errors.priority) {
                        const newErrors = { ...errors };
                        delete newErrors.priority;
                        setErrors(newErrors);
                      }
                    }}
                    style={{ fontSize: "12px", fontWeight: 600, padding: "4px 8px", background: "var(--alps-bg)", border: `1px solid ${errors.priority ? "var(--alps-danger)" : "var(--alps-border)"}`, borderRadius: "3px", color: "var(--alps-text)", cursor: "pointer", fontFamily: "var(--font-sans)" }}
                  >
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                  </select>
                  {errors.priority && (
                    <div style={{ fontSize: "10px", color: "var(--alps-danger)", marginTop: "4px", fontWeight: 600 }}>{errors.priority}</div>
                  )}
                </div>
              ) : (
                <div style={{ fontSize: "12px", fontWeight: 600, color: priorityColor(displayTicket.priority), textTransform: "capitalize" }}>{displayTicket.priority}</div>
              )}
            </Field>
            <Field label="Assignee">
              {isEditing ? (
                <select
                  value={editedTicket.assignee}
                  onChange={(e) => setEditedTicket({ ...editedTicket, assignee: e.target.value })}
                  style={{ fontSize: "11px", padding: "4px 8px", background: "var(--alps-bg)", border: "1px solid var(--alps-border)", borderRadius: "3px", color: "var(--alps-text)", cursor: "pointer", fontFamily: "var(--font-sans)", width: "100%" }}
                >
                  {Object.keys(PEOPLE).map(k => (
                    <option key={k} value={k}>{PEOPLE[k].fullName}</option>
                  ))}
                </select>
              ) : (
                <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                  <Avatar person={displayTicket.assignee} size={18} />
                  <div style={{ fontSize: "11px" }}>{PEOPLE[displayTicket.assignee]?.fullName}</div>
                </div>
              )}
            </Field>
            <Field label="Due Date">
              {isEditing ? (
                <div>
                  <input
                    type="date"
                    value={editedTicket.dueDate || ""}
                    onChange={(e) => {
                      setEditedTicket({ ...editedTicket, dueDate: e.target.value });
                      // Clear error on change
                      if (errors.dueDate) {
                        const newErrors = { ...errors };
                        delete newErrors.dueDate;
                        setErrors(newErrors);
                      }
                    }}
                    style={{ fontSize: "11px", fontFamily: "monospace", padding: "4px 8px", background: "var(--alps-bg)", border: `1px solid ${errors.dueDate ? "var(--alps-danger)" : "var(--alps-border)"}`, borderRadius: "3px", color: "var(--alps-text)", fontFamily: "var(--font-sans)", width: "100%" }}
                  />
                  {errors.dueDate && (
                    <div style={{ fontSize: "10px", color: "var(--alps-danger)", marginTop: "4px", fontWeight: 600 }}>{errors.dueDate}</div>
                  )}
                </div>
              ) : (
                <div style={{ fontSize: "11px", fontFamily: "monospace", color: overdue ? "#dc2626" : "var(--alps-text)", fontWeight: overdue ? 600 : 400 }}>
                  {overdue && "⚠ "}{displayTicket.dueDate || "—"}
                </div>
              )}
            </Field>
            <Field label="Linked Gate"><div style={{ fontSize: "11px", fontWeight: 600, color: "var(--alps-text)", textTransform: "capitalize", padding: "2px 8px", background: "var(--alps-bg)", borderRadius: "3px", display: "inline-block" }}>{displayTicket.gate}</div></Field>
            <Field label="Cycle"><div style={{ fontSize: "11px" }}>{cycleName}</div></Field>
            <Field label="Project"><div style={{ fontSize: "11px", fontWeight: 600, color: "var(--alps-text)" }}>{PROJECT.id} · {PROJECT.title}</div></Field>
          </div>

          <Field label="Description">
            {isEditing ? (
              <textarea
                value={editedTicket.description}
                onChange={(e) => setEditedTicket({ ...editedTicket, description: e.target.value })}
                style={{ fontSize: "12px", color: "var(--alps-text)", lineHeight: 1.5, padding: "10px 12px", background: "var(--alps-bg)", borderRadius: "4px", border: "1px solid var(--alps-border)", fontFamily: "var(--font-sans)", width: "100%", minHeight: "80px", resize: "vertical" }}
              />
            ) : (
              <div style={{ fontSize: "12px", color: "var(--alps-text)", lineHeight: 1.5, padding: "10px 12px", background: "var(--alps-bg)", borderRadius: "4px" }}>{displayTicket.description}</div>
            )}
          </Field>

          <Field label="Git Activity">
            <div style={{ display: "grid", gap: "6px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "8px 10px", background: "var(--alps-bg)", borderRadius: "4px", fontSize: "11px" }}>
                <span style={{ fontFamily: "monospace", color: "var(--alps-primary)", fontWeight: 600 }}>{displayTicket.gitlab}</span>
                <span style={{ color: "var(--alps-text-muted)", flex: 1 }}>{displayTicket.status === "done" ? "merged" : displayTicket.status === "in_progress" ? "open · 2 commits ahead" : displayTicket.gitlab === "—" ? "no branch yet" : "draft"}</span>
              </div>
              {displayTicket.progress > 0 && (
                <div style={{ padding: "8px 10px", background: "var(--alps-bg)", borderRadius: "4px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: "10px", color: "var(--alps-text-muted)", marginBottom: "4px" }}>
                    <span>Progress</span><span style={{ fontWeight: 600, color: "var(--alps-text)" }}>{displayTicket.progress}%</span>
                  </div>
                  <div style={{ height: "4px", background: "var(--alps-bg-alt)", borderRadius: "2px", overflow: "hidden" }}>
                    <div style={{ height: "100%", background: statusColor(displayTicket.status), width: `${displayTicket.progress}%` }}></div>
                  </div>
                </div>
              )}
            </div>
          </Field>

          <Field label="Test Evidence & Attachments">
            <div style={{ display: "grid", gap: "8px" }}>
              <window.Attachment_List
                attachments={window.TICKET_ATTACHMENTS?.[displayTicket.id] || []}
                emptyMessage="No attachments"
                compact={true}
              />
              {!isEditing && (
                <window.Attachment_Upload_Placeholder
                  entityType="ticket"
                  entityId={displayTicket.id}
                />
              )}
            </div>
          </Field>

          {displayTicket.blockedBy && (
            <Field label="Dependencies">
              <div style={{ fontSize: "11px", padding: "8px 10px", background: "var(--alps-bg)", borderRadius: "4px" }}>
                Blocked by: <span style={{ color: "var(--alps-danger)", fontWeight: 600 }}>{displayTicket.blockedBy}</span>
              </div>
            </Field>
          )}

          <Field label="Discussion">
            <window.DiscussionPanel
              entityId={displayTicket.id}
              entityType="ticket"
              previewMode={false}
            />
          </Field>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
