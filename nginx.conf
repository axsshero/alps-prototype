server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index "ALPS Prototype.html";

    location / {
        try_files $uri $uri/ "ALPS Prototype.html";
    }

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
